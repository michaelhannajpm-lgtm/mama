<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F6EFE2"/>
      <stop offset="50%" stop-color="#EFE6D2"/>
      <stop offset="100%" stop-color="#FAF5EA"/>
    </linearGradient>
    <radialGradient id="rose" cx="20%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#E8B4A0" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#E8B4A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sage" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#A8BCA0" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#A8BCA0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background washes -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#rose)"/>
  <rect width="1200" height="630" fill="url(#sage)"/>

  <!-- Logo: heart-with-check, terracotta -->
  <g transform="translate(96, 96)">
    <!-- Heart shadow -->
    <ellipse cx="60" cy="138" rx="34" ry="4" fill="#2A1E22" opacity="0.08"/>
    <!-- Heart shape -->
    <path d="M 60 130
             C 30 110, 6 84, 6 54
             C 6 30, 24 14, 44 14
             C 54 14, 60 22, 60 30
             C 60 22, 66 14, 76 14
             C 96 14, 114 30, 114 54
             C 114 84, 90 110, 60 130 Z"
          fill="#C8553D"/>
    <!-- Check mark -->
    <path d="M 32 56 L 52 76 L 88 36"
          stroke="#FAF5EA" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark "Mama" — last 'a' italic terracotta -->
  <text x="240" y="200" font-family="Fraunces, Georgia, serif" font-size="124" font-weight="500"
        letter-spacing="-2" fill="#2A1E22">Mam<tspan font-style="italic" fill="#C8553D" dx="2">a</tspan></text>

  <!-- Tagline -->
  <text x="96" y="310" font-family="Fraunces, Georgia, serif" font-size="58" font-weight="400"
        letter-spacing="-1.4" fill="#2A1E22">Your kids need <tspan font-style="italic" fill="#C8553D">friends</tspan>,</text>
  <text x="96" y="378" font-family="Fraunces, Georgia, serif" font-size="58" font-weight="400"
        letter-spacing="-1.4" fill="#2A1E22">and so do <tspan font-style="italic" fill="#C8553D">you</tspan>.</text>

  <!-- Promise -->
  <text x="96" y="464" font-family="Albert Sans, system-ui, sans-serif" font-size="26" font-weight="500"
        fill="#5A4B4F">Real meetups, made for mom's busy calendar.</text>

  <!-- Bottom row: pills -->
  <g transform="translate(96, 506)" font-family="Albert Sans, system-ui, sans-serif" font-size="20" font-weight="600">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="220" height="48" rx="24" fill="#C8553D"/>
    <text x="110" y="32" text-anchor="middle" fill="#FAF5EA" letter-spacing="0.5">♥ Verified moms</text>

    <!-- Pill 2 -->
    <rect x="240" y="0" width="240" height="48" rx="24" fill="#7E9678"/>
    <text x="360" y="32" text-anchor="middle" fill="#FFFFFF" letter-spacing="0.5">Schedule-first</text>

    <!-- Pill 3 -->
    <rect x="500" y="0" width="200" height="48" rx="24" fill="#2A1E22"/>
    <text x="600" y="32" text-anchor="middle" fill="#D9A441" letter-spacing="0.5">Anti-Tinder</text>
  </g>

  <!-- Top right: launch cities marker -->
  <g transform="translate(880, 110)">
    <rect x="0" y="0" width="220" height="78" rx="14" fill="#2A1E22" opacity="0.92"/>
    <text x="20" y="32" font-family="Albert Sans, system-ui, sans-serif" font-size="14" font-weight="700"
          fill="#D9A441" letter-spacing="2.5">LAUNCHING</text>
    <text x="20" y="62" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="500"
          fill="#FAF5EA">Tampa &amp; beyond</text>
  </g>

  <!-- Subtle grid texture in corner -->
  <g opacity="0.06" stroke="#2A1E22" stroke-width="1">
    <line x1="1080" y1="540" x2="1180" y2="540"/>
    <line x1="1080" y1="560" x2="1180" y2="560"/>
    <line x1="1080" y1="580" x2="1180" y2="580"/>
  </g>
</svg>
