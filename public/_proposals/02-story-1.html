<!doctype html>
<html><head><meta charset="utf-8"><title>B1 — Story Walk slide 1</title>
<link rel="stylesheet" href="/_proposals/_base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; background: #FBEEEA; }
  .topbar { padding: 18px 22px 0; display: flex; justify-content: space-between; align-items: center; }
  .topbar img { height: 20px; }
  .skip { font-size: 13px; color: var(--navy-muted); font-weight: 600; }
  .hero {
    margin: 14px 22px 0;
    border-radius: 26px;
    overflow: hidden;
    height: 360px;
    box-shadow: 0 20px 40px -22px rgba(27,42,78,.4);
    position: relative;
  }
  .hero img { width: 100%; height: 100%; object-fit: cover; }
  .copy {
    padding: 28px 26px 0;
    text-align: center;
  }
  .copy h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .copy p {
    margin-top: 10px;
    font-size: 13.5px;
    color: var(--navy-soft);
    line-height: 1.45;
  }
  .pager {
    display: flex; justify-content: center; gap: 6px;
    margin: 18px 0 0;
  }
  .pager span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--coral-soft);
  }
  .pager .on { background: var(--coral); width: 18px; border-radius: 999px; }
  .footer { margin-top: auto; padding: 14px 22px 24px; display: flex; justify-content: flex-end; }
  .next {
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 12px 24px -10px rgba(214,68,106,.6);
  }
</style></head>
<body><div class="screen">
  <div class="topbar"><img src="/gomama-logo.png" alt=""><div class="skip">Skip</div></div>

  <div class="hero"><img src="/landing-moms.png" alt=""></div>

  <div class="copy">
    <h1>Your kid needs a <span class="emph">friend</span>.<br>So do <span class="emph">you</span>.</h1>
    <p>Local moms at the same stage of life — not strangers, not influencers.</p>
  </div>

  <div class="pager"><span class="on"></span><span></span><span></span></div>

  <div class="footer">
    <button class="next">Next
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
</div></body></html>
