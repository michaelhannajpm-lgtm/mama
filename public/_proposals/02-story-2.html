<!doctype html>
<html><head><meta charset="utf-8"><title>B2 — Story Walk slide 2</title>
<link rel="stylesheet" href="/_proposals/_base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; background: #FBEEEA; }
  .topbar { padding: 18px 22px 0; display: flex; justify-content: space-between; align-items: center; }
  .topbar img { height: 20px; }
  .skip { font-size: 13px; color: var(--navy-muted); font-weight: 600; }

  .stat-card {
    margin: 26px 22px 0;
    background: var(--paper);
    border-radius: 26px;
    padding: 22px 22px 20px;
    box-shadow: 0 18px 36px -22px rgba(27,42,78,.3);
    text-align: center;
  }
  .big-num {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 64px;
    line-height: 1;
    color: var(--coral);
    letter-spacing: -0.04em;
  }
  .num-sub {
    font-size: 13px;
    color: var(--navy-soft);
    margin-top: 4px;
  }
  .avatars {
    display: flex; justify-content: center;
    margin-top: 14px;
  }
  .avatars span {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2.5px solid var(--paper);
    margin-left: -8px;
    background: var(--coral-soft);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 13px;
    color: var(--coral-deep);
  }
  .avatars span:first-child { margin-left: 0; }
  .avatars .a2 { background: var(--peach); color: #B05A2F; }
  .avatars .a3 { background: var(--lilac); color: #7E5BAE; }
  .avatars .a4 { background: var(--sage); color: var(--sage-dark); }
  .avatars .a5 { background: var(--coral); color: white; font-size: 11px; }

  .copy {
    padding: 24px 26px 0;
    text-align: center;
  }
  .copy h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .copy p {
    margin-top: 10px;
    font-size: 13.5px;
    color: var(--navy-soft);
    line-height: 1.45;
  }
  .pager {
    display: flex; justify-content: center; gap: 6px;
    margin-top: 18px;
  }
  .pager span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--coral-soft);
  }
  .pager .on { background: var(--coral); width: 18px; border-radius: 999px; }
  .footer { margin-top: auto; padding: 14px 22px 24px; display: flex; justify-content: space-between; align-items: center; }
  .back {
    background: transparent; border: none;
    color: var(--navy-muted);
    font-size: 14px; font-weight: 600;
  }
  .next {
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 700;
    display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 12px 24px -10px rgba(214,68,106,.6);
  }
</style></head>
<body><div class="screen">
  <div class="topbar"><img src="/gomama-logo.png" alt=""><div class="skip">Skip</div></div>

  <div class="stat-card">
    <div class="big-num">247</div>
    <div class="num-sub">Tampa moms joined this week</div>
    <div class="avatars">
      <span class="a1">S</span><span class="a2">M</span><span class="a3">A</span><span class="a4">J</span><span class="a5">+243</span>
    </div>
  </div>

  <div class="copy">
    <h1>Real meetups.<br><span class="emph">Not endless chat.</span></h1>
    <p>The whole app is built around your week — coffee Tuesday, park Saturday, done.</p>
  </div>

  <div class="pager"><span></span><span class="on"></span><span></span></div>

  <div class="footer">
    <button class="back">← Back</button>
    <button class="next">Next
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
</div></body></html>
