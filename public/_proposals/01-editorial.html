<!doctype html>
<html><head><meta charset="utf-8"><title>A — Editorial Magazine</title>
<link rel="stylesheet" href="/_proposals/_base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; background: #FBEEEA; }
  .topbar { padding: 18px 22px 0; display: flex; justify-content: center; }
  .topbar img { height: 22px; opacity: .92; }
  .headline {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--navy);
    font-size: 34px;
    line-height: 1.05;
    letter-spacing: -0.025em;
    padding: 14px 22px 10px;
    text-align: left;
  }
  .sub {
    padding: 0 22px;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--navy-soft);
    max-width: 320px;
  }
  .photo-wrap {
    margin: 16px 22px 0;
    border-radius: 22px;
    overflow: hidden;
    height: 215px;
    background: #f0d8d0;
    position: relative;
    box-shadow: 0 16px 36px -22px rgba(27,42,78,.35);
  }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-wrap .tampa-chip {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(6px);
  }
  .promises {
    margin-top: 18px;
    padding: 0 22px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }
  .promise {
    display: flex; align-items: center; gap: 11px;
  }
  .promise .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--coral);
    flex-shrink: 0;
  }
  .promise b {
    font-size: 14.5px;
    font-weight: 700;
    color: var(--navy);
  }
  .promise span {
    font-size: 13px;
    color: var(--navy-soft);
    margin-left: 6px;
  }
  .footer {
    margin-top: auto;
    padding: 14px 22px 22px;
  }
</style></head>
<body><div class="screen">
  <div class="topbar"><img src="/gomama-logo.png" alt="Go Mama"></div>

  <h1 class="headline">
    Your kid needs<br>
    a <span class="emph">friend</span>, and<br>
    so do <span class="emph">you</span>.
  </h1>
  <div class="sub">A verified-only mom-friendship app built for real meetups — not endless chat.</div>

  <div class="photo-wrap">
    <img src="/landing-moms.png" alt="">
    <div class="chip tampa-chip">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#E96B7D" stroke-width="2.5"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/></svg>
      Now welcoming Tampa, FL
    </div>
  </div>

  <div class="promises">
    <div class="promise"><span class="dot"></span><b>Verified moms only.</b><span>Photo + social check.</span></div>
    <div class="promise"><span class="dot"></span><b>Real meetups.</b><span>Not endless chat.</span></div>
    <div class="promise"><span class="dot"></span><b>Built for mom-time.</b><span>Around your week.</span></div>
  </div>

  <div class="footer">
    <button class="cta">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Find My Village
    </button>
    <div class="login-link">Already have an account? <span>Log in</span></div>
  </div>
</div></body></html>
