<!doctype html>
<html><head><meta charset="utf-8"><title>C — Magazine Cover</title>
<link rel="stylesheet" href="/_proposals/_base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; background: #FBEEEA; }
  .screen { background: var(--paper); }
  .hero {
    position: relative;
    height: 520px;
    overflow: hidden;
  }
  .hero img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: center 25%;
  }
  .hero::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 60%;
    background: linear-gradient(180deg, transparent 0%, rgba(20,30,55,0) 35%, rgba(20,30,55,.55) 75%, rgba(20,30,55,.78) 100%);
  }
  .tampa-sticker {
    position: absolute; top: 18px; right: 18px;
    background: var(--coral);
    color: white;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 11.5px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 5px;
    box-shadow: 0 10px 22px -8px rgba(214,68,106,.6);
    z-index: 2;
  }
  .logo-overlay {
    position: absolute; top: 18px; left: 22px;
    z-index: 2;
  }
  .logo-overlay img { height: 24px; filter: drop-shadow(0 2px 8px rgba(0,0,0,.25)); }
  .headline {
    position: absolute; left: 22px; right: 22px; bottom: 22px;
    z-index: 2;
    color: white;
  }
  .headline h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 38px;
    line-height: 1.02;
    letter-spacing: -0.025em;
    text-shadow: 0 2px 16px rgba(0,0,0,.35);
  }
  .headline .emph { color: #FFD0D5; }
  .headline p {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(255,255,255,.85);
    font-weight: 500;
  }

  .below {
    padding: 18px 22px 18px;
    flex: 1;
    display: flex; flex-direction: column;
    background: var(--paper);
  }
  .proof {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--divider);
  }
  .proof-avatars { display: flex; }
  .proof-avatars span {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2.5px solid var(--paper);
    margin-left: -8px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 11px;
    color: white;
  }
  .proof-avatars span:first-child { margin-left: 0; }
  .proof-avatars .a1 { background: var(--coral); }
  .proof-avatars .a2 { background: #B05A2F; }
  .proof-avatars .a3 { background: #7E5BAE; }
  .proof-text {
    flex: 1;
    font-size: 12.5px;
    color: var(--navy);
    line-height: 1.35;
  }
  .proof-text b { font-weight: 700; color: var(--navy); }

  .footer {
    margin-top: auto;
    padding-top: 14px;
  }
</style></head>
<body><div class="screen">
  <div class="hero">
    <div class="logo-overlay"><img src="/gomama-logo.png" alt=""></div>
    <div class="tampa-sticker">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/></svg>
      Now in Tampa
    </div>
    <img src="/landing-moms.png" alt="">
    <div class="headline">
      <h1>Your kid needs<br>a <span class="emph">friend</span>.<br>So do <span class="emph">you</span>.</h1>
      <p>Verified mom-friendship, built for real meetups.</p>
    </div>
  </div>

  <div class="below">
    <div class="proof">
      <div class="proof-avatars"><span class="a1">S</span><span class="a2">M</span><span class="a3">A</span></div>
      <div class="proof-text"><b>1,247 verified moms</b> matching this week — Tampa, FL.</div>
    </div>

    <div class="footer">
      <button class="cta">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        Find My Village
      </button>
      <div class="login-link">Already have an account? <span>Log in</span></div>
    </div>
  </div>
</div></body></html>
