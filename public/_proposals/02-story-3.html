<!doctype html>
<html><head><meta charset="utf-8"><title>B3 — Story Walk slide 3</title>
<link rel="stylesheet" href="/_proposals/_base.css">
<style>
  body { display: flex; align-items: center; justify-content: center; background: #FBEEEA; }
  .topbar { padding: 18px 22px 0; display: flex; justify-content: space-between; align-items: center; }
  .topbar img { height: 20px; }
  .skip { font-size: 13px; color: var(--navy-muted); font-weight: 600; }

  .verified-card {
    margin: 18px 22px 0;
    background: var(--paper);
    border-radius: 26px;
    padding: 22px;
    box-shadow: 0 18px 36px -22px rgba(27,42,78,.3);
  }
  .badge-row {
    display: flex; align-items: center; gap: 12px;
  }
  .badge-icon {
    width: 48px; height: 48px;
    background: var(--sage);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .badge-row b {
    display: block;
    font-family: 'Fraunces', serif; font-weight: 600; font-size: 18px;
    color: var(--navy); letter-spacing: -0.01em;
  }
  .badge-row span {
    font-size: 12px;
    color: var(--navy-soft);
  }
  .check-list {
    margin-top: 16px;
    display: flex; flex-direction: column; gap: 10px;
    padding-top: 14px;
    border-top: 1px solid var(--divider);
  }
  .check-item {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
    color: var(--navy);
  }
  .check-item svg { flex-shrink: 0; }
  .check-item b { font-weight: 600; }

  .copy {
    padding: 22px 26px 0;
    text-align: center;
  }
  .copy h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--navy);
  }
  .copy p {
    margin-top: 10px;
    font-size: 13.5px;
    color: var(--navy-soft);
    line-height: 1.45;
  }
  .pager {
    display: flex; justify-content: center; gap: 6px;
    margin-top: 16px;
  }
  .pager span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--coral-soft);
  }
  .pager .on { background: var(--coral); width: 18px; border-radius: 999px; }
  .footer { margin-top: auto; padding: 14px 22px 22px; }
</style></head>
<body><div class="screen">
  <div class="topbar"><img src="/gomama-logo.png" alt=""><div class="skip">Skip</div></div>

  <div class="verified-card">
    <div class="badge-row">
      <div class="badge-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5E7A3B" stroke-width="2.4"><path d="M12 2 4 5v6c0 5 3.5 9.5 8 11 4.5-1.5 8-6 8-11V5l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <div>
        <b>Verified moms only</b>
        <span>Every account checked</span>
      </div>
    </div>
    <div class="check-list">
      <div class="check-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E96B7D" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg>
        <b>Real photo</b> · selfie + ID match
      </div>
      <div class="check-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E96B7D" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg>
        <b>Social check</b> · Instagram or Facebook
      </div>
      <div class="check-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E96B7D" stroke-width="2.6"><path d="M20 6 9 17l-5-5"/></svg>
        <b>Local only</b> · within your neighborhood
      </div>
    </div>
  </div>

  <div class="copy">
    <h1>No bots. No men.<br>Just <span class="emph">moms like you</span>.</h1>
  </div>

  <div class="pager"><span></span><span></span><span class="on"></span></div>

  <div class="footer">
    <button class="cta">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Find My Village
    </button>
    <div class="login-link">Already have an account? <span>Log in</span></div>
  </div>
</div></body></html>
